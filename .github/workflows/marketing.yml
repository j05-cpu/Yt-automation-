name: Marketing Bot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  capture-and-process:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache disabled - no lock file
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install Node.js dependencies
        run: npm install playwright
      
      - name: Install Playwright browsers
        run: npx playwright install chromium
      
      - name: Install Python Watchdog
        run: pip install watchdog
      
      - name: Run capture
        run: |
          export APP_URL="${{ secrets.APP_URL || 'https://f21467cc-364a-4249-bae9-b4e193ff390f-00-yzv5rigbah39.pike.replit.dev/' }}"
          echo "Using APP_URL: $APP_URL"
          node capture.js
      
      - name: Run video editor
        run: |
          export CAPTION="${{ secrets.CAPTION || 'Ab AI automation hua aur bhi asaan!' }}"
          echo "Using CAPTION: $CAPTION"
          python editor.py
      
      - name: Upload marketing video
        uses: actions/upload-artifact@v4
        with:
          name: marketing_ready
          path: recordings/marketing_ready.*
          retention-days: 30